# ── CI Module: Publish (agnostico) ────────────────────────────────────────────
#
# Template riusabile per la fase di Build e Publish. Contiene la logica agnostica:
#   - Checkout del codice applicativo
#   - Versionamento semantico e Git tagging (Set-Versioning.ps1)
#   - Pubblicazione del Pipeline Artifact
#
# I passi tech-specific vengono iniettati dal caller tramite:
#   - `buildSteps`   → compilazione nel job Compile (stage Build)
#   - `publishSteps` → trasformazioni e publish nel job PublishArtifact (stage Publish)
#
# Contratto con il caller
# ───────────────────────
#   I `publishSteps` devono scrivere l'output in $(Build.ArtifactStagingDirectory)/publish
#   perché PublishPipelineArtifact@1 legge da quel path fisso.
#
# Parametri
# ─────────
#   projectName    → nome del repo applicativo (default: nome del repo ADO)
#   buildSteps     → stepList iniettata nel job Compile dopo il checkout
#   publishSteps   → stepList iniettata nel job PublishArtifact dopo Set-Versioning
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: buildSteps
    type: stepList
    default: []

  - name: publishSteps
    type: stepList
    default: []

# ─────────────────────────────────────────────────────────────────────────────

stages:
  - stage: Build
    displayName: 'Automated Build'
    jobs:
      - job: Compile
        displayName: 'Restore and Build'
        steps:
          - checkout: self
            path: s/${{ parameters.projectName }}

          - ${{ parameters.buildSteps }}

  - stage: Publish
    displayName: 'Publish and Tagging'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: PublishArtifact
        displayName: 'Release Promotion'
        environment: '$(targetEnvironment)'
        strategy:
          runOnce:
            deploy:
              steps:
                # 1. Scarica il codice del progetto chiamante (con i tag Git)
                - checkout: self
                  path: s/${{ parameters.projectName }}
                  fetchDepth: 0
                  persistCredentials: true
                  fetchTags: true

                # 2. Checkout inline diretto al repo condiviso
                - checkout: git://Demetra/DPS.Demetra.Infrastructure
                  path: s/DPS.Demetra.Infrastructure

                - task: PowerShell@2
                  displayName: 'Conditional Versioning and Tagging'
                  inputs:
                    filePath: '$(Build.SourcesDirectory)/DPS.Demetra.Infrastructure/pipelines/V1/CI/scripts/Set-Versioning.ps1'
                    workingDirectory: '$(Build.SourcesDirectory)/${{ parameters.projectName }}'
                    pwsh: true
                  env:
                    TARGET_ENV: $(targetEnvironment)
                    REQUIRE_TAG: $(requireTag)
                    BUILD_ID: $(Build.BuildId)
                    PROJECT_NAME: ${{ parameters.projectName }}

                # 3. Passi tech-specific: trasformazione config, publish, verifiche
                - ${{ parameters.publishSteps }}

                # 4. Pubblicazione artifact (Pipeline Artifacts — moderno)
                - task: PublishPipelineArtifact@1
                  displayName: 'Final Artifact Upload'
                  inputs:
                    targetPath: '$(Build.ArtifactStagingDirectory)/publish'
                    artifact: '$(computedArtifactName)'
                    publishLocation: 'pipeline'
