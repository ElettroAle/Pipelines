# ==============================================================================
# Azure DevOps CD Pipeline - Engine API Development
# ==============================================================================
# This pipeline deploys the Engine API to Azure App Service in Development environment
# Triggered automatically when CI pipeline publishes a new artifact
#
# VARIABLE GROUP: Platform-CD-Dev (managed by Terraform)
# Variables are automatically populated from Terraform modules - no manual updates needed!
# - azureSubscription: Azure Service Connection name
# - engineApiAppServiceName: Target App Service name
# - engineApiArtifactName: Package name from CI pipeline
# - engineApiCiPipelineName: CI pipeline that produces the artifact
#
# TRIGGER: Automatically deploys when CI pipeline publishes new artifact on main branch

trigger: none

pr: none

resources:
  pipelines:
    - pipeline: CI
      source: Aidea.Dxp.AI.Api.Publish
      trigger:
        branches:
          include:
            - main
        enabled: true

variables:
  - group: Platform-CD-Dev

stages:
  - template: ../CD/Modules/deployAppService.yaml
    parameters:
      pipelineResource: CI
      pipelineSource: Aidea.Dxp.AI.Api.Publish
      artifactName: 'drop'
      azureSubscription: '$(azureSubscription)'
      appName: '$(engineApiAppServiceName)'
      environmentName: 'Platform-Dev'
      displayName: 'Deploy Engine API'
      poolName: 'aidea-self-hosted-agents'
