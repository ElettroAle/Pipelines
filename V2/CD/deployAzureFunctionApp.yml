# ==============================================================================
# Azure DevOps CD Pipeline - Worker Function Development
# ==============================================================================
# This pipeline deploys the Worker Function to Azure Function App in Development environment
# Triggered automatically when CI pipeline publishes a new artifact
#
# VARIABLE GROUP: Platform-CD-Dev (managed by Terraform)
# Variables are automatically populated from Terraform modules - no manual updates needed!
# - azureSubscription: Azure Service Connection name
# - workerFunctionAppName: Target Function App name
# - workerArtifactName: Package name from CI pipeline
# - workerCiPipelineName: CI pipeline that produces the artifact
#
# TRIGGER: Automatically deploys when CI pipeline publishes new artifact on main branch

trigger: none

pr: none

resources:
  pipelines:
    - pipeline: CI
      source: Aidea.Dxp.AI.Worker.Publish
      trigger:
        branches:
          include:
            - main
        enabled: true

variables:
  - group: Platform-CD-Dev

stages:
  - template: ../CD/Modules/deployFunctionApp.yaml
    parameters:
      pipelineResource: CI
      pipelineSource: Aidea.Dxp.AI.Worker.Publish
      artifactName: 'drop'
      azureSubscription: '$(azureSubscription)'
      functionAppName: '$(workerFunctionAppName)'
      environmentName: 'Platform-Dev'
      displayName: 'Deploy Worker Function'
      poolName: 'aidea-self-hosted-agents'
