parameters:
  - name: appKind
    type: string # allowed values: webApp | functionApp
  - name: azureSubscription
    type: string
  - name: appName
    type: string
  - name: artifactName
    type: string
  - name: packagePath
    type: string
  - name: deploymentMethod
    type: string
    default: 'auto'

steps:
- ${{ if eq(parameters.appKind, 'webApp') }}:
  - task: AzureRmWebAppDeployment@5
    displayName: 'Deploy web app: ${{ parameters.appName }}'
    inputs:
      azureSubscription: '${{ parameters.azureSubscription }}'
      appType: 'webApp'
      WebAppName: '${{ parameters.appName }}'
      package: ${{ format('$(Pipeline.Workspace)/{0}/{1}/{2}', parameters.packageName, parameters.artifactName, parameters.packagePath) }}
      deploymentMethod: '${{ parameters.deploymentMethod }}'

- ${{ if eq(parameters.appKind, 'functionApp') }}:
  - task: AzureFunctionApp@2
    displayName: 'Deploy function app: ${{ parameters.appName }}'
    inputs:
      azureSubscription: '${{ parameters.azureSubscription }}'
      appType: 'functionApp'
      appName: '${{ parameters.appName }}'
      package: ${{ format('$(Pipeline.Workspace)/{0}/{1}/{2}', parameters.packageName, parameters.artifactName, parameters.packagePath) }}
      deploymentMethod: '${{ parameters.deploymentMethod }}'
