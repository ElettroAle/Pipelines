parameters:
  - name: pipelineResource
    type: string
    default: 'CI'
  - name: pipelineSource
    type: string
  - name: artifactName
    type: string
    default: 'drop'
  - name: azureSubscription
    type: string
  - name: appName
    type: string
  - name: appKind
    type: string
    default: 'webApp' # or 'functionApp'
  - name: packageName
    type: string
    default: 'drop'
  - name: packagePath
    type: string
    default: '**/*.zip'

steps:
  - template: Modules/downloadArtifact.yaml
    parameters:
      pipelineResource: ${{ parameters.pipelineResource }}
      pipelineSource: ${{ parameters.pipelineSource }}
      packageName: ${{ parameters.packageName }}

  - template: Modules/deployWebApp.yaml
    parameters:
      appKind: ${{ parameters.appKind }}
      azureSubscription: ${{ parameters.azureSubscription }}
      appName: ${{ parameters.appName }}
      artifactName: ${{ parameters.artifactName }}
      packagePath: ${{ parameters.packagePath }}
