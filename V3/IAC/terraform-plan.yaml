# ── Terraform Plan Pipeline ────────────────────────────────────────────────────
#
# Purpose: run terraform init + plan and publish the output as an artifact.
#          Used as Build Validation in main branch policies.
#          The pipeline FAILS if terraform plan returns exit code 1 (error).
#
# trigger: none  →  the trigger is managed by Azure DevOps (branch policy).
#
# Prerequisites
# ─────────────
# 1. Marketplace extension: ms-devlabs.custom-terraform-tasks
#    (TerraformInstaller@1 and TerraformTaskV4@4)
#
# 2. tfbackend file in the repo: azure/env/int/int.tfbackend
#    (no sensitive data — already versioned in the repository)
#
# 3. Variable Group with the variable:
#    azureServiceConnection → name of the ARM service connection in Azure DevOps
#
# ─────────────────────────────────────────────────────────────────────────────

trigger: none

parameters:
  - name: environment
    displayName: 'Target environment'
    type: string
    default: 'int'
    values:
      - int

variables:
  - group: terraform-common   # Variable Group in Pipelines → Library (contains: azureServiceConnection)
  - name: TF_DIR
    value: '$(System.DefaultWorkingDirectory)/azure/env/${{ parameters.environment }}'
  - name: TF_VARS_FILE
    value: '${{ parameters.environment }}.tfvars'
  - name: TF_BACKEND_FILE
    value: '${{ parameters.environment }}.tfbackend'
  - name: TF_PLAN_ARTIFACT
    value: 'tfplan-${{ parameters.environment }}'

stages:
  - stage: Plan
    displayName: 'Terraform Init & Plan'
    jobs:
      - job: TerraformPlan
        displayName: 'Init & Plan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(TF_DIR)'
              backendType: 'azurerm'
              backendServiceArm: '$(azureServiceConnection)'
              commandOptions: '-backend-config="$(TF_DIR)/$(TF_BACKEND_FILE)" -reconfigure'

          # publishPlanResults shows the diff directly in the PR UI (Checks tab)
          # -detailed-exitcode: exit 0 = no changes, exit 2 = changes present
          # TerraformTaskV4 handles both as success and sets
          # the output variable TERRAFORM_PLAN_HAS_CHANGES (true/false)
          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            name: plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(TF_DIR)'
              environmentServiceNameAzureRM: '$(azureServiceConnection)'
              commandOptions: >-
                -var-file="$(TF_VARS_FILE)"
                -out="$(Build.ArtifactStagingDirectory)/tfplan.binary"
                -detailed-exitcode
                -no-color
              publishPlanResults: 'Terraform Plan — ${{ parameters.environment }}'

          # Publish tfplan.binary as a downloadable artifact from the PR
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Plan artifact'
            condition: succeeded()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact:   '$(TF_PLAN_ARTIFACT)'
              publishLocation: 'pipeline'
