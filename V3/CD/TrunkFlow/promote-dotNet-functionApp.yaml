# ── CD: Promote TrunkFlow — .NET → Azure Function App ─────────────────────────
#
# Entry point di CD Promote per progetti .NET su Azure Function App (Windows)
# con governance TrunkFlow.
#
# Responsabilità di questo file
# ──────────────────────────────
#   1. Definisce variabili di build (.NET SDK, config, runtime)
#   2. Inietta nell'orchestratore `Modules/promote.yaml`:
#      - buildSteps         → compilazione .NET
#      - publishSteps       → dotnet publish con versione embedded
#      - stagingDeploySteps → deploy zip su Function App di staging
#      - prodDeploySteps    → deploy zip su Function App di production
#
#   L'orchestratore è agnostico rispetto alla piattaforma di hosting;
#   tutta la logica Function App risiede qui e in `../Common/Steps/`.
#   Per supportare una tecnologia diversa (App Service, Container, ecc.)
#   basta creare un nuovo entry point che inietti step template diversi.
#
# Flusso
# ──────
#   StagingPromotion → Verify-SemVer → Set-Versioning → Build → Publish (versionato)
#                   → Upload artifact staging → Deploy Function App staging
#   ProdPromotion   → Download artifact staging → Deploy Function App production
#
# Utilizzo nel repo applicativo
# ─────────────────────────────
#   Il file di raccordo nel repo applicativo deve:
#     1. Definire trigger: none (il promote è sempre manuale)
#     2. Includere questo template con `extends:`
#     3. Passare i parametri obbligatori
#
#   Esempio raccordo (nel repo applicativo):
#
#     trigger: none
#     pr: none
#
#     resources:
#       repositories:
#         - repository: infrastructure
#           type: git
#           name: MyOrg/Pipelines
#
#     extends:
#       template: V3/CD/TrunkFlow/promote-dotNet-functionApp.yaml@infrastructure
#       parameters:
#         projectName: 'MyApp.Functions'
#         azureServiceConnection: 'sc-arm-myapp'
#         stagingFunctionAppName: 'func-myapp-be-staging'
#         prodFunctionAppName: 'func-myapp-be-prod'
#
# Parametri richiesti
# ───────────────────
#   projectName              → nome del repo (checkout path e artifact naming)
#   azureServiceConnection   → nome della service connection ARM in Azure DevOps
#   stagingFunctionAppName   → nome completo Azure Function App di staging
#   prodFunctionAppName      → nome completo Azure Function App di production
#
# Parametri opzionali
# ───────────────────
#   stagingEnvironment       → nome ADO environment per staging (default: 'Staging')
#   prodEnvironment          → nome ADO environment per production (default: 'Production')
#   checkoutRepository       → repository da fare checkout
#   targetRuntime            → runtime identifier .NET (es. win-x64, linux-x64)
#   selfContained            → binario self-contained (default: 'false')
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    displayName: 'Nome progetto'
    type: string
    default: '$(Build.Repository.Name)'

  - name: azureServiceConnection
    displayName: 'Nome della service connection ARM in Azure DevOps'
    type: string

  - name: stagingFunctionAppName
    displayName: 'Nome completo Function App di staging'
    type: string

  - name: prodFunctionAppName
    displayName: 'Nome completo Function App di production'
    type: string

  - name: stagingEnvironment
    displayName: 'Nome ADO environment per staging'
    type: string
    default: 'Staging'

  - name: prodEnvironment
    displayName: 'Nome ADO environment per production'
    type: string
    default: 'Production'

  - name: checkoutRepository
    displayName: 'Repository da fare checkout'
    type: string

  - name: targetRuntime
    displayName: 'Runtime identifier .NET (es. win-x64, linux-x64)'
    type: string

  - name: selfContained
    displayName: 'Binario self-contained (true | false)'
    type: string
    default: 'false'

  - name: variableSubstitution
    displayName: 'Abilita sostituzione variabili JSON (FileTransform)'
    type: boolean
    default: false

  - name: substitutionFolder
    displayName: 'Path relativo a $(Build.SourcesDirectory) per FileTransform'
    type: string
    default: ''
    # Obbligatorio se variableSubstitution: true
    # Esempio: 'MyApp/MyApp' (path relativo a $(Build.SourcesDirectory))

# ─────────────────────────────────────────────────────────────────────────────

variables:
  - group: "staging"

# ─────────────────────────────────────────────────────────────────────────────

stages:
  - template: ./Modules/promote.yaml
    parameters:
      projectName: ${{ parameters.projectName }}
      checkoutRepository: ${{ parameters.checkoutRepository }}
      stagingEnvironment: ${{ parameters.stagingEnvironment }}
      prodEnvironment: ${{ parameters.prodEnvironment }}

      buildSteps:
        - template: ../../CI/Common/Steps/dotnet-build.yaml
          parameters:
            projects: '${{ parameters.projectName }}/${{ parameters.projectName }}.csproj'
            dotnetVersion: '10.0.x'
            buildConfiguration: 'Release'

      publishSteps:
        - template: ../../CI/Common/Steps/dotnet-publish.yaml
          parameters:
            publishProject: '${{ parameters.projectName }}/${{ parameters.projectName }}.csproj'
            dotnetVersion: '10.0.x'
            buildConfiguration: 'Release'
            outputDirectory: '$(Build.ArtifactStagingDirectory)/publish'
            targetEnvironment: '${{ parameters.stagingEnvironment }}'
            targetRuntime: '${{ parameters.targetRuntime }}'
            selfContained: '${{ parameters.selfContained }}'
            versionArgs: '/p:Version=$(currentTag) /p:AssemblyVersion=$(currentTag) /p:FileVersion=$(currentTag) /p:InformationalVersion="$(currentTag)-$(gitHash)"'
            variableSubstitution: ${{ parameters.variableSubstitution }}
            substitutionFolder: '${{ parameters.substitutionFolder }}'

      stagingDeploySteps:
        - template: ../Common/Steps/functionApp-deploy.yaml
          parameters:
            azureServiceConnection: ${{ parameters.azureServiceConnection }}
            functionAppName: ${{ parameters.stagingFunctionAppName }}
            packagePath: '$(Build.ArtifactStagingDirectory)/publish/**/*.zip'

      prodDeploySteps:
        - template: ../Common/Steps/functionApp-deploy.yaml
          parameters:
            azureServiceConnection: ${{ parameters.azureServiceConnection }}
            functionAppName: ${{ parameters.prodFunctionAppName }}
            packagePath: '$(Pipeline.Workspace)/staging/**/*.zip'
