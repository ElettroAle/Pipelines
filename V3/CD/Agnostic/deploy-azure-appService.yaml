# ── CD: Deploy Agnostic — .NET → Azure App Service ────────────────────────────
#
# Entry point di CD Deploy per progetti .NET su Azure App Service (Windows).
# Agnostico rispetto a trigger e branch — tutta la configurazione di
# trigger/resource va nel file di raccordo del repo applicativo.
#
# Vincolo ADO: il file di raccordo deve definire un pipeline resource
# con l'alias passato in `ciPipelineResourceAlias` (default: ci_be),
# perché questo template lo referenzia in DownloadPipelineArtifact.
#
# Flusso
# ──────
#   Stage Deploy (deployment → approval via ADO environment)
#     1. Sopprime auto-download artifact
#     2. Scarica il Pipeline Artifact dalla CI (latestFromBranch)
#     3. appService-deploy: zipDeploy sull'App Service di destinazione
#
# Parametri richiesti
# ───────────────────
#   projectName              → nome del progetto (display name del job)
#   azureServiceConnection   → nome della service connection ARM in Azure DevOps
#   targetEnvironment        → nome dell'ambiente ADO (Development | Staging | Production)
#   webAppName               → nome completo dell'App Service (es. app-myapp-be-int)
#
# Parametri opzionali
# ───────────────────
#   ciPipelineResourceAlias  → alias del pipeline resource dichiarato nel raccordo
#                              (default: 'ci_be')
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    displayName: 'Nome progetto'
    type: string

  - name: azureServiceConnection
    displayName: 'Nome della service connection ARM in Azure DevOps'
    type: string

  - name: targetEnvironment
    displayName: 'Ambiente ADO'
    type: string

  - name: webAppName
    displayName: 'Nome completo App Service'
    type: string

  - name: ciPipelineResourceAlias
    displayName: 'Alias del pipeline resource dichiarato nel raccordo'
    type: string
    default: 'ci_be'

# ─────────────────────────────────────────────────────────────────────────────

stages:
  - stage: Deploy
    displayName: 'Deploy su ${{ parameters.targetEnvironment }}'
    jobs:
      - deployment: DeployWebApp
        displayName: 'Deploy BE — ${{ parameters.webAppName }}'
        environment: '${{ parameters.targetEnvironment }}'
        strategy:
          runOnce:
            deploy:
              steps:

                # ── 1. Sopprime l'auto-download degli artifact ───────────────
                # I deployment job scaricano automaticamente i Pipeline Artifacts
                # di tutti i pipeline resource dichiarati (tra cui ci_be).
                # Lo supprimiamo per gestire path e branch-filter esplicitamente.
                - download: none

                # ── 2. Scarica i Pipeline Artifacts dalla CI ─────────────────
                # buildVersionToDownload: latestFromBranch → prende l'ultimo run
                # green sul branch che ha triggerato questa pipeline.
                # Il nome dell'artifact è dinamico: scarichiamo tutto e
                # usiamo il pattern glob nello step di deploy.
                - task: DownloadPipelineArtifact@2
                  displayName: 'Scarica artifact dalla CI'
                  inputs:
                    buildType: 'specific'
                    project: '$(System.TeamProjectId)'
                    definition: '$(resources.pipeline.${{ parameters.ciPipelineResourceAlias }}.pipelineID)'
                    buildVersionToDownload: 'latestFromBranch'
                    branchName: '$(Build.SourceBranch)'
                    downloadPath: '$(Pipeline.Workspace)/${{ parameters.ciPipelineResourceAlias }}'

                # ── 3. Deploy su Azure App Service ───────────────────────────
                - template: ../Common/Steps/appService-deploy.yaml
                  parameters:
                    azureServiceConnection: '${{ parameters.azureServiceConnection }}'
                    webAppName: '${{ parameters.webAppName }}'
                    packagePath: '$(Pipeline.Workspace)/${{ parameters.ciPipelineResourceAlias }}/**/*.zip'
