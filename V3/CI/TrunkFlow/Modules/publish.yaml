# ── CI Module: Publish (TrunkFlow) ────────────────────────────────────────────
#
# Template riusabile per Build e Publish con governance TrunkFlow.
#
# Rispetto alla versione GitFlow (CI/GitFlow/Modules/publish.yaml):
#   - Set-Versioning è chiamato con REQUIRE_TAG=false → versione pre-release
#     calcolata come {lastTag}.{BuildId}, senza creare tag Git
#   - Il branch-conditional logic (requireTag, targetEnvironment) è assente:
#     il CI TrunkFlow gira sempre su main ed è sempre Development
#
# Rispetto alla versione agnostica (CI/Modules/publish.yaml):
#   - Il nome dell'artifact è calcolato da Set-Versioning (non è un parametro)
#   - La versione è embedded nel binario tramite /p:Version=$(currentTag)
#
# Contratto con il caller
# ───────────────────────
#   I `publishSteps` devono scrivere l'output in $(Build.ArtifactStagingDirectory)/publish
#   perché PublishPipelineArtifact@1 legge da quel path fisso.
#   Possono usare $(currentTag) e $(gitHash), esposti da Set-Versioning.
#
# Variabili attese (settate dal caller):
#   targetEnvironment → di solito 'Development'
#
# Parametri
# ─────────
#   projectName        → nome del repo applicativo (default: nome del repo ADO)
#   checkoutRepository → repository da fare checkout [REQUIRED]
#   buildSteps         → stepList iniettata nel job Compile dopo il checkout
#   publishSteps       → stepList iniettata nel job PublishArtifact dopo Set-Versioning
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: checkoutRepository
    type: string

  - name: buildSteps
    type: stepList
    default: []

  - name: publishSteps
    type: stepList
    default: []

# ─────────────────────────────────────────────────────────────────────────────

stages:
  - stage: Build
    displayName: 'Automated Build'
    jobs:
      - job: Compile
        displayName: 'Restore and Build'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: ${{ parameters.checkoutRepository }}
            path: s/${{ parameters.projectName }}

          - ${{ parameters.buildSteps }}

  - stage: PublishDev
    displayName: 'Publish Dev Artifact'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: PublishArtifact
        displayName: 'Release Dev Build'
        environment: '$(targetEnvironment)'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  path: s/${{ parameters.projectName }}
                  fetchDepth: 0
                  fetchTags: true

                - checkout: infrastructure
                  path: s/infrastructure

                # ── Dev Versioning ─────────────────────────────────────────
                # REQUIRE_TAG=false → nessun tag Git creato.
                # Versione calcolata come {lastTag}.{BuildId} (es. 1.2.3.456).
                # Espone: $(currentTag), $(gitHash), $(computedArtifactName).
                - task: PowerShell@2
                  displayName: 'Dev Versioning (no tag)'
                  inputs:
                    filePath: '$(Build.SourcesDirectory)/infrastructure/pipelines/V3/CI/Scripts/Set-Versioning.ps1'
                    workingDirectory: '$(Build.SourcesDirectory)/${{ parameters.projectName }}'
                    pwsh: true
                  env:
                    TARGET_ENV: $(targetEnvironment)
                    REQUIRE_TAG: 'false'
                    BUILD_ID: $(Build.BuildId)
                    PROJECT_NAME: ${{ parameters.projectName }}

                - ${{ parameters.publishSteps }}

                - task: PublishPipelineArtifact@1
                  displayName: 'Upload Dev Artifact'
                  inputs:
                    targetPath: '$(Build.ArtifactStagingDirectory)/publish'
                    artifact: '$(computedArtifactName)'
                    publishLocation: 'pipeline'
