# в”Ђв”Ђ CI: Publish DotNet (TrunkFlow) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#
# Template CI per progetti .NET con governance TrunkFlow.
#
# Rispetto alla versione GitFlow (CI/GitFlow/publish-dotNet.yaml):
#   - Nessun variable group branch-conditional: TrunkFlow gira sempre su main
#   - Set-Versioning ГЁ chiamato con REQUIRE_TAG=false в†’ versione pre-release
#     embedded nel binario, senza creare tag Git
#   - Nessun tagging nella CI: il tag SemVer viene apposto dalla CD promote
#
# Flusso
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#   Stage Build      в†’ Restore e Compile
#   Stage PublishDev в†’ Set-Versioning (no tag) в†’ FileTransform в†’ Publish в†’ Upload
#
# Il file di raccordo nel repo applicativo estende questo template e dichiara
# il trigger (es. push su main).
#
# Parametri
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#   projectName в†’ nome del repo (usato per checkout path e artifact naming)
#
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

variables:
  - name: publishProject
    value: '${{ parameters.projectName }}/${{ parameters.projectName }}.csproj'
  - name: outputDirectory
    value: '$(Build.ArtifactStagingDirectory)/publish'
  - name: dotnetVersion
    value: '10.0.x'
  - name: buildConfiguration
    value: 'Release'
  - name: targetRuntime
    value: 'win-x64'
  - name: selfContained
    value: 'true'
  - name: targetEnvironment
    value: 'Development'
  - group: "development"

stages:
  - template: ./Modules/publish.yaml
    parameters:
      projectName: ${{ parameters.projectName }}
      buildSteps:
        - task: UseDotNet@2
          displayName: 'Install .NET SDK'
          inputs:
            version: $(dotnetVersion)

        - task: DotNetCoreCLI@2
          displayName: 'DotNet Build'
          inputs:
            command: 'build'
            projects: '$(publishProject)'
            arguments: '--configuration $(buildConfiguration)'

      publishSteps:
        - task: FileTransform@2
          displayName: 'JSON Variable Substitution'
          inputs:
            folderPath: '$(Build.SourcesDirectory)/${{ parameters.projectName }}/${{ parameters.projectName }}'
            jsonTargetFiles: '**/appsettings.$(targetEnvironment).json'

        - task: DotNetCoreCLI@2
          displayName: 'DotNet Publish'
          inputs:
            command: 'publish'
            projects: '$(publishProject)'
            arguments: >
              --configuration $(buildConfiguration)
              /p:RuntimeIdentifier=$(targetRuntime)
              /p:SelfContained=$(selfContained)
              /p:EnvironmentName=$(targetEnvironment)
              /p:Version=$(currentTag)
              /p:AssemblyVersion=$(currentTag)
              /p:FileVersion=$(currentTag)
              /p:InformationalVersion="$(currentTag)-$(gitHash)"
              --output $(outputDirectory)
            modifyOutputPath: false
            zipAfterPublish: true

        - script: |
            if grep -q "__ENVIRONMENT_REQUIRED__" $(outputDirectory)/web.config; then
              echo "##[error]XDT Transformation failed."
              exit 1
            fi
          displayName: 'Verify XDT'
