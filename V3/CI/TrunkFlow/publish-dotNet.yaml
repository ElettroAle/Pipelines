# ── CI: Publish DotNet (TrunkFlow) ────────────────────────────────────────────
#
# Template CI per progetti .NET con governance TrunkFlow.
#
# Rispetto alla versione GitFlow (CI/GitFlow/publish-dotNet.yaml):
#   - Nessun variable group branch-conditional: TrunkFlow gira sempre su main
#   - Set-Versioning è chiamato con REQUIRE_TAG=false → versione pre-release
#     embedded nel binario, senza creare tag Git
#   - Nessun tagging nella CI: il tag SemVer viene apposto dalla CD promote
#
# Flusso
# ──────
#   Stage Build      → Restore e Compile
#   Stage PublishDev → Set-Versioning (no tag) → FileTransform → Publish → Upload
#
# Il file di raccordo nel repo applicativo estende questo template e dichiara
# il trigger (es. push su main).
#
# Parametri
# ─────────
#   projectName → nome del repo (usato per checkout path e artifact naming)
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: checkoutRepository
    type: string

  - name: targetRuntime
    type: string
    # Esempi: win-x64, linux-x64, osx-x64
    # Lista completa: https://learn.microsoft.com/dotnet/core/rid-catalog

  - name: selfContained
    type: string
    default: 'false'
    # Valori: 'true' | 'false'

  - name: variableSubstitution
    type: boolean
    default: false

  - name: substitutionFolder
    type: string
    default: ''
    # Obbligatorio se variableSubstitution: true
    # Esempio: 'MyApp/MyApp' (path relativo a $(Build.SourcesDirectory))

  - name: enableSonar
    type: boolean
    default: false

  - name: sonarServiceConnection
    type: string
    default: 'SonarCloud'

  - name: sonarOrganization
    type: string
    default: ''

  - name: sonarProjectKey
    type: string
    default: ''

variables:
  - name: targetEnvironment
    value: 'Development'
  - group: "development"

stages:
  - template: ./Modules/publish.yaml
    parameters:
      projectName: ${{ parameters.projectName }}
      checkoutRepository: ${{ parameters.checkoutRepository }}
      buildSteps:
        - template: ../Common/Steps/dotnet-build.yaml
          parameters:
            projects: '${{ parameters.projectName }}/${{ parameters.projectName }}.csproj'
            dotnetVersion: '10.0.x'
            buildConfiguration: 'Release'
        - template: ../Common/Steps/dotnet-sonar.yaml
          parameters:
            enableSonar: ${{ parameters.enableSonar }}
            sonarServiceConnection: ${{ parameters.sonarServiceConnection }}
            sonarOrganization: ${{ parameters.sonarOrganization }}
            sonarProjectKey: ${{ parameters.sonarProjectKey }}

      publishSteps:
        - template: ../Common/Steps/dotnet-publish.yaml
          parameters:
            publishProject: '${{ parameters.projectName }}/${{ parameters.projectName }}.csproj'
            dotnetVersion: '10.0.x'
            buildConfiguration: 'Release'
            outputDirectory: '$(Build.ArtifactStagingDirectory)/publish'
            targetRuntime: '${{ parameters.targetRuntime }}'
            selfContained: '${{ parameters.selfContained }}'
            versionArgs: '/p:Version=$(currentTag) /p:AssemblyVersion=$(currentTag) /p:FileVersion=$(currentTag) /p:InformationalVersion="$(currentTag)-$(gitHash)"'
            variableSubstitution: ${{ parameters.variableSubstitution }}
            substitutionFolder: '${{ parameters.substitutionFolder }}'
