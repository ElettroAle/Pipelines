# ── CI Common: Quality (agnostico) ────────────────────────────────────────────
#
# Orchestratore riusabile per la Quality gate, agnostico rispetto al workflow Git.
#
# Differenze rispetto a GitFlow/Modules/quality.yaml:
#   - Nessuna validazione del titolo PR (Conventional Commits / SemVer)
#   - Nessun versionamento
#
# I passi tech-specific (build, test, coverage) vengono iniettati
# tramite il parametro `buildAndTestSteps`.
#
# Parametri
# ─────────
#   buildAndTestSteps  → stepList iniettata nel job BuildAndTest dopo Gitleaks
#   checkoutRepository → repository da fare checkout [REQUIRED]
#   gitLeaksNoGit      → passa --no-git a Gitleaks (default: false)
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: buildAndTestSteps
    type: stepList
    default: []

  - name: checkoutRepository
    type: string

  - name: gitLeaksNoGit
    type: boolean
    default: false

# ─────────────────────────────────────────────────────────────────────────────

stages:
  - stage: Quality
    displayName: 'Quality Checks'
    jobs:
      - template: ./Jobs/quality-build-and-test.yaml
        parameters:
          checkoutRepository: ${{ parameters.checkoutRepository }}
          gitLeaksNoGit: ${{ parameters.gitLeaksNoGit }}
          buildAndTestSteps: ${{ parameters.buildAndTestSteps }}
