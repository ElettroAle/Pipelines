# ── CI Step: DotNet Publish ────────────────────────────────────────────────────
#
# Step template condiviso per la fase di publish di progetti .NET.
#
# Riusato da:
#   CI/Agnostic/publish-dotNet.yaml
#   CI/GitFlow/publish-dotNet.yaml
#   CI/TrunkFlow/publish-dotNet.yaml
#   CD/TrunkFlow/promote-dotNet-appService.yaml
#
# Il parametro `versionArgs` distingue i casi d'uso:
#   - Agnostico   → versionArgs='' (default) → nessuna versione embedded nel binario
#   - GitFlow/TrunkFlow/Promote → versionArgs='/p:Version=...' → versione embedded
#
# Parametri
# ─────────
#   projectName            → nome repo (per FileTransform folderPath)
#                            obbligatorio solo se variableSubstitution: true
#   targetEnvironment      → ambiente target (compile-time o variabile runtime)
#   outputDirectory        → path output artifact   (default: variabile $(outputDirectory))
#   publishProject         → path del .csproj        (default: variabile $(publishProject))
#   buildConfiguration     → configurazione build    (default: variabile $(buildConfiguration))
#   targetRuntime          → runtime identifier      (default: variabile $(targetRuntime))
#   selfContained          → self-contained flag     (default: variabile $(selfContained))
#   versionArgs            → argomenti /p:Version=…  (default: '' → omesso)
#   variableSubstitution   → abilita FileTransform JSON + Verify XDT (default: false)
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: ''

  - name: targetEnvironment
    type: string
    default: '$(targetEnvironment)'

  - name: outputDirectory
    type: string
    default: '$(outputDirectory)'

  - name: publishProject
    type: string
    default: '$(publishProject)'

  - name: buildConfiguration
    type: string
    default: '$(buildConfiguration)'

  - name: targetRuntime
    type: string
    default: '$(targetRuntime)'

  - name: selfContained
    type: string
    default: '$(selfContained)'

  - name: versionArgs
    type: string
    default: ''

  - name: variableSubstitution
    type: boolean
    default: false

# ─────────────────────────────────────────────────────────────────────────────

steps:
  - ${{ if parameters.variableSubstitution }}:
    - task: FileTransform@2
      displayName: 'JSON Variable Substitution'
      inputs:
        folderPath: '$(Build.SourcesDirectory)/${{ parameters.projectName }}/${{ parameters.projectName }}'
        jsonTargetFiles: '**/appsettings.${{ parameters.targetEnvironment }}.json'

  - task: DotNetCoreCLI@2
    displayName: 'DotNet Publish'
    inputs:
      command: 'publish'
      projects: '${{ parameters.publishProject }}'
      arguments: >
        --configuration ${{ parameters.buildConfiguration }}
        /p:RuntimeIdentifier=${{ parameters.targetRuntime }}
        /p:SelfContained=${{ parameters.selfContained }}
        /p:EnvironmentName=${{ parameters.targetEnvironment }}
        ${{ parameters.versionArgs }}
        --output ${{ parameters.outputDirectory }}
      modifyOutputPath: false
      zipAfterPublish: true

  - ${{ if parameters.variableSubstitution }}:
    - script: |
        if grep -q "__ENVIRONMENT_REQUIRED__" ${{ parameters.outputDirectory }}/web.config; then
          echo "##[error]XDT Transformation failed."
          exit 1
        fi
      displayName: 'Verify XDT'
