# ── CI Step: Angular Quality ───────────────────────────────────────────────────
#
# Step template condiviso per la fase di quality gate di progetti Angular.
# Contiene: installazione Node.js, npm ci, ng build (compile check).
#
# Riusato da:
#   CI/Agnostic/quality-angular.yaml
#   CI/GitFlow/quality-angular.yaml
#
# Parametri
# ─────────
#   nodeVersion → versione Node.js (default: variabile $(nodeVersion))
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: nodeVersion
    type: string
    default: '$(nodeVersion)'

# ─────────────────────────────────────────────────────────────────────────────

steps:
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: ${{ parameters.nodeVersion }}

  - script: npm ci
    displayName: 'Install Dependencies'
    workingDirectory: $(Build.SourcesDirectory)

  - script: npx ng build
    displayName: 'Angular Build (compile check)'
    workingDirectory: $(Build.SourcesDirectory)

