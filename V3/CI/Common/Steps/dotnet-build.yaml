# ── CI Step: DotNet Build ──────────────────────────────────────────────────────
#
# Step template condiviso per la fase di build di progetti .NET.
# Installa l'SDK e compila i progetti specificati (singolo o glob pattern).
#
# Riusato da:
#   CI/Agnostic/publish-dotNet.yaml
#   CI/Agnostic/quality-dotNet.yaml
#   CI/GitFlow/publish-dotNet.yaml
#   CI/GitFlow/quality-dotNet.yaml
#   CI/TrunkFlow/publish-dotNet.yaml
#   CD/TrunkFlow/promote-dotNet-appService.yaml
#
# Parametri
# ─────────
#   dotnetVersion      → versione SDK .NET                    (default: variabile $(dotnetVersion))
#   projects           → path o glob pattern del/dei .csproj  (default: variabile $(publishProject))
#   buildConfiguration → configurazione build                 (default: variabile $(buildConfiguration))
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: dotnetVersion
    type: string
    default: '$(dotnetVersion)'

  - name: projects
    type: string
    default: '$(publishProject)'

  - name: buildConfiguration
    type: string
    default: '$(buildConfiguration)'

# ─────────────────────────────────────────────────────────────────────────────

steps:
  - task: UseDotNet@2
    displayName: 'Install .NET SDK'
    inputs:
      version: ${{ parameters.dotnetVersion }}

  - task: DotNetCoreCLI@2
    displayName: 'DotNet Build'
    inputs:
      command: 'build'
      projects: '${{ parameters.projects }}'
      arguments: '--configuration ${{ parameters.buildConfiguration }}'
