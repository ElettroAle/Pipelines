# ── CI Step: DotNet Build ──────────────────────────────────────────────────────
#
# Step template condiviso per la fase di build di progetti .NET.
#
# Riusato da:
#   CI/Agnostic/publish-dotNet.yaml
#   CI/GitFlow/publish-dotNet.yaml
#   CI/TrunkFlow/publish-dotNet.yaml
#   CD/TrunkFlow/promote-dotNet-appService.yaml
#
# Parametri
# ─────────
#   dotnetVersion      → versione SDK .NET      (default: variabile $(dotnetVersion))
#   publishProject     → path del .csproj        (default: variabile $(publishProject))
#   buildConfiguration → configurazione build    (default: variabile $(buildConfiguration))
#   selfContained      → self-contained build     (default: variabile $(selfContained))
#   targetRuntime      → runtime identifier RID   (default: variabile $(targetRuntime))
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: dotnetVersion
    type: string
    default: '$(dotnetVersion)'

  - name: publishProject
    type: string
    default: '$(publishProject)'

  - name: buildConfiguration
    type: string
    default: '$(buildConfiguration)'

  - name: selfContained
    type: string
    default: '$(selfContained)'

  - name: targetRuntime
    type: string
    default: '$(targetRuntime)'

# ─────────────────────────────────────────────────────────────────────────────

steps:
  - task: UseDotNet@2
    displayName: 'Install .NET SDK'
    inputs:
      version: ${{ parameters.dotnetVersion }}

  - task: DotNetCoreCLI@2
    displayName: 'DotNet Build'
    inputs:
      command: 'build'
      projects: '${{ parameters.publishProject }}'
      arguments: '--configuration ${{ parameters.buildConfiguration }} /p:RuntimeIdentifier=${{ parameters.targetRuntime }} /p:SelfContained=${{ parameters.selfContained }}'
