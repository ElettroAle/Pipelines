# ── CI Agnostic: Quality Angular ───────────────────────────────────────────────
#
# Template di Quality gate per progetti Angular, agnostico rispetto al workflow Git.
# Non include validazione SemVer né versionamento.
#
# Può essere precursore di GitFlow/quality-angular.yaml, che aggiunge
# la validazione del titolo PR (Conventional Commits).
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: checkoutRepository
    type: string

  - name: enableSonar
    type: boolean
    default: false

  - name: sonarServiceConnection
    type: string
    default: 'SonarCloud'

  - name: sonarOrganization
    type: string
    default: ''

  - name: sonarProjectKey
    type: string
    default: ''

variables:
  - name: nodeVersion
    value: '22.x'
  - group: "common-quality"

stages:
  - template: ../Common/quality.yaml
    parameters:
      checkoutRepository: ${{ parameters.checkoutRepository }}
      buildAndTestSteps:
        - template: ../Common/Steps/angular-quality.yaml
        - ${{ if parameters.enableSonar }}:
          - template: ../Common/Steps/angular-sonar.yaml
            parameters:
              sonarServiceConnection: ${{ parameters.sonarServiceConnection }}
              sonarOrganization: ${{ parameters.sonarOrganization }}
              sonarProjectKey: ${{ parameters.sonarProjectKey }}
              sonarSources: ${{ parameters.projectName }}
