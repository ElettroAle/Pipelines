# ── CI Agnostic: Publish Angular ───────────────────────────────────────────────
#
# Template di Build e Publish per progetti Angular, agnostico rispetto al workflow Git.
# Non include versionamento semantico né tagging Git.
#
# Può essere precursore di GitFlow/publish-angular.yaml, che aggiunge
# Set-Versioning, tagging Git e branch-conditional variable groups.
#
# Parametri
# ─────────
#   projectName        → nome del repo (usato per checkout path e artifact naming)
#   targetEnvironment  → ambiente target (es. development, staging, production)
#   buildConfiguration → configurazione Angular (es. development, staging, production)
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: checkoutRepository
    type: string

  - name: targetEnvironment
    type: string
    default: 'Development'

  - name: buildConfiguration
    type: string
    default: 'development'

  - name: enableSonar
    type: boolean
    default: false

  - name: sonarServiceConnection
    type: string
    default: 'SonarCloud'

  - name: sonarOrganization
    type: string
    default: ''

  - name: sonarProjectKey
    type: string
    default: ''

variables:
  - name: nodeVersion
    value: '22.x'
  - name: outputDirectory
    value: '$(Build.ArtifactStagingDirectory)/publish'
  - name: targetEnvironment
    value: '${{ parameters.targetEnvironment }}'

stages:
  - template: ../Common/publish.yaml
    parameters:
      projectName: ${{ parameters.projectName }}
      checkoutRepository: ${{ parameters.checkoutRepository }}
      artifactName: '${{ parameters.projectName }}-${{ parameters.targetEnvironment }}'
      buildSteps:
        - template: ../Common/Steps/angular-build.yaml
          parameters:
            buildConfiguration: '${{ parameters.buildConfiguration }}'
        - template: ../Common/Steps/angular-sonar.yaml
          parameters:
            enableSonar: ${{ parameters.enableSonar }}
            sonarServiceConnection: ${{ parameters.sonarServiceConnection }}
            sonarOrganization: ${{ parameters.sonarOrganization }}
            sonarProjectKey: ${{ parameters.sonarProjectKey }}

      publishSteps:
        - template: ../Common/Steps/angular-publish.yaml
          parameters:
            projectName: ${{ parameters.projectName }}
            buildConfiguration: '${{ parameters.buildConfiguration }}'
