# ── CI: Publish DotNet (agnostico) ────────────────────────────────────────────
#
# Template di Build e Publish per progetti .NET, agnostico rispetto al workflow Git.
# Non include versionamento semantico né tagging Git.
#
# Può essere precursore di GitFlow/publish-dotNet.yaml, che aggiunge
# Set-Versioning, tagging Git e branch-conditional variable groups.
#
# Parametri
# ─────────
#   projectName       → nome del repo (usato per checkout path e artifact naming)
#   targetEnvironment → ambiente target (es. Development, Staging, Production)
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: targetEnvironment
    type: string
    default: 'Development'

variables:
  - name: publishProject
    value: '${{ parameters.projectName }}/${{ parameters.projectName }}.csproj'
  - name: outputDirectory
    value: '$(Build.ArtifactStagingDirectory)/publish'
  - name: dotnetVersion
    value: '10.0.x'
  - name: buildConfiguration
    value: 'Release'
  - name: targetRuntime
    value: 'win-x64'
  - name: selfContained
    value: 'true'
  - name: targetEnvironment
    value: '${{ parameters.targetEnvironment }}'

stages:
  - template: ./Modules/publish.yaml
    parameters:
      projectName: ${{ parameters.projectName }}
      artifactName: '${{ parameters.projectName }}-${{ parameters.targetEnvironment }}'
      buildSteps:
        - task: UseDotNet@2
          displayName: 'Install .NET SDK'
          inputs:
            version: $(dotnetVersion)

        - task: DotNetCoreCLI@2
          displayName: 'DotNet Build'
          inputs:
            command: 'build'
            projects: '$(publishProject)'
            arguments: '--configuration $(buildConfiguration)'

      publishSteps:
        - task: FileTransform@2
          displayName: 'JSON Variable Substitution'
          inputs:
            folderPath: '$(Build.SourcesDirectory)/${{ parameters.projectName }}/${{ parameters.projectName }}'
            jsonTargetFiles: '**/appsettings.${{ parameters.targetEnvironment }}.json'

        - task: DotNetCoreCLI@2
          displayName: 'DotNet Publish'
          inputs:
            command: 'publish'
            projects: '$(publishProject)'
            arguments: >
              --configuration $(buildConfiguration)
              /p:RuntimeIdentifier=$(targetRuntime)
              /p:SelfContained=$(selfContained)
              /p:EnvironmentName=$(targetEnvironment)
              --output $(outputDirectory)
            modifyOutputPath: false
            zipAfterPublish: true

        - script: |
            if grep -q "__ENVIRONMENT_REQUIRED__" $(outputDirectory)/web.config; then
              echo "##[error]XDT Transformation failed."
              exit 1
            fi
          displayName: 'Verify XDT'
