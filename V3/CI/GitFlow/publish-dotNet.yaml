# ── CI GitFlow: Publish DotNet ─────────────────────────────────────────────────
#
# Template di Build e Publish per progetti .NET con governance GitFlow.
#
# Rispetto alla versione agnostica (CI/Agnostic/publish-dotNet.yaml), aggiunge:
#   - Set-Versioning: calcolo SemVer da commit e tagging Git
#   - Branch-conditional variable groups (dev/staging/main/feature)
#   - Versione applicata alla build DotNet (/p:Version, /p:AssemblyVersion, ecc.)
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: checkoutRepository
    type: string

  - name: targetRuntime
    type: string
    # Esempi: win-x64, linux-x64, osx-x64
    # Lista completa: https://learn.microsoft.com/dotnet/core/rid-catalog

  - name: selfContained
    type: string
    default: 'false'
    # Valori: 'true' | 'false'

  - name: variableSubstitution
    type: boolean
    default: false

  - name: substitutionFolder
    type: string
    default: ''
    # Obbligatorio se variableSubstitution: true
    # Esempio: 'MyApp/MyApp' (path relativo a $(Build.SourcesDirectory))

  - name: enableSonar
    type: boolean
    default: false

  - name: sonarServiceConnection
    type: string
    default: 'SonarCloud'

  - name: sonarOrganization
    type: string
    default: ''

  - name: sonarProjectKey
    type: string
    default: ''

variables:
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/dev') }}:
    - group: "development"
    - name: requireTag
      value: 'false'

  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/staging') }}:
    - group: "staging"
    - name: requireTag
      value: 'true'

  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    - group: "production"
    - name: requireTag
      value: 'true'

  - ${{ if and(ne(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.SourceBranch'], 'refs/heads/dev'), ne(variables['Build.SourceBranch'], 'refs/heads/staging')) }}:
    - group: "development"
    - name: requireTag
      value: 'true'
    - name: targetEnvironment
      value: 'Development'

stages:
  - template: ./Modules/publish.yaml
    parameters:
      projectName: ${{ parameters.projectName }}
      checkoutRepository: ${{ parameters.checkoutRepository }}
      buildSteps:
        - template: ../Common/Steps/dotnet-build.yaml
          parameters:
            projects: '**/${{ parameters.projectName }}.csproj'
            dotnetVersion: '10.0.x'
            buildConfiguration: 'Release'
        - template: ../Common/Steps/dotnet-sonar.yaml
          parameters:
            enableSonar: ${{ parameters.enableSonar }}
            sonarServiceConnection: ${{ parameters.sonarServiceConnection }}
            sonarOrganization: ${{ parameters.sonarOrganization }}
            sonarProjectKey: ${{ parameters.sonarProjectKey }}

      publishSteps:
        - template: ../Common/Steps/dotnet-publish.yaml
          parameters:
            publishProject: '**/${{ parameters.projectName }}.csproj'
            dotnetVersion: '10.0.x'
            buildConfiguration: 'Release'
            outputDirectory: '$(Build.ArtifactStagingDirectory)/publish'
            targetRuntime: '${{ parameters.targetRuntime }}'
            selfContained: '${{ parameters.selfContained }}'
            versionArgs: '/p:Version=$(currentTag) /p:AssemblyVersion=$(currentTag) /p:FileVersion=$(currentTag) /p:InformationalVersion="$(currentTag)-$(gitHash)"'
            variableSubstitution: ${{ parameters.variableSubstitution }}
            substitutionFolder: '${{ parameters.substitutionFolder }}'
