# ── CI Module: Quality (GitFlow) ──────────────────────────────────────────────
#
# Template riusabile per la Quality gate con governance GitFlow.
#
# Rispetto alla versione agnostica (CI/Common/quality.yaml), aggiunge:
#   - Job ValidatePRTitle: verifica Conventional Commits / SemVer sulle PR
#     verso branch protetti (main, staging + eventuali additional)
#
# I passi tech-specific (build, test, coverage) vengono iniettati
# tramite il parametro `buildAndTestSteps`.
#
# Parametri
# ─────────
#   projectName        → nome del repo applicativo (default: nome del repo ADO)
#   buildAndTestSteps  → stepList iniettata nel job BuildAndTest dopo Gitleaks
#   checkoutRepository → repository da fare checkout [REQUIRED]
#   gitLeaksNoGit      → passa --no-git a Gitleaks (default: true)
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: buildAndTestSteps
    type: stepList
    default: []

  - name: checkoutRepository
    type: string

  - name: gitLeaksNoGit
    type: boolean
    default: true

# ─────────────────────────────────────────────────────────────────────────────

stages:
  - stage: Quality
    displayName: 'Quality Checks'
    jobs:

      - job: ValidatePRTitle
        displayName: 'Validate SemVer Title'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        steps:
          - checkout: ${{ parameters.checkoutRepository }}
            path: s/${{ parameters.projectName }}
            fetchDepth: 10

          - checkout: infrastructure
            path: s/infrastructure

          - task: PowerShell@2
            displayName: 'Verify SemVer in PR Commits'
            inputs:
              filePath: '$(Build.SourcesDirectory)/infrastructure/V3/CI/Scripts/Verify-SemVer.ps1'
              workingDirectory: '$(Build.SourcesDirectory)/${{ parameters.projectName }}'
              pwsh: true
            env:
              TARGET_BRANCH: $(System.PullRequest.TargetBranch)
              ADDITIONAL_TAG_BRANCHES: $(additionalRequiredTaggingBranches)

      - template: ../../Common/Jobs/quality-build-and-test.yaml
        parameters:
          checkoutRepository: ${{ parameters.checkoutRepository }}
          gitLeaksNoGit: ${{ parameters.gitLeaksNoGit }}
          buildAndTestSteps: ${{ parameters.buildAndTestSteps }}
