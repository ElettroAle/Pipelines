# ── CI GitFlow: Quality Angular ────────────────────────────────────────────────
#
# Template di Quality gate per progetti Angular con governance GitFlow.
#
# Rispetto alla versione agnostica (CI/Agnostic/quality-angular.yaml), aggiunge:
#   - Validazione titolo PR (Conventional Commits / SemVer) verso branch protetti
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

  - name: checkoutRepository
    type: string

  - name: enableSonar
    type: boolean
    default: false

  - name: sonarServiceConnection
    type: string
    default: 'SonarCloud'

  - name: sonarOrganization
    type: string
    default: ''

  - name: sonarProjectKey
    type: string
    default: ''

variables:
  - name: nodeVersion
    value: '22.x'
  - group: "common-quality"

stages:
  - template: ./Modules/quality.yaml
    parameters:
      projectName: ${{ parameters.projectName }}
      checkoutRepository: ${{ parameters.checkoutRepository }}
      buildAndTestSteps:
        - template: ../Common/Steps/angular-quality.yaml
        - ${{ if parameters.enableSonar }}:
          - template: ../Common/Steps/angular-sonar.yaml
            parameters:
              sonarServiceConnection: ${{ parameters.sonarServiceConnection }}
              sonarOrganization: ${{ parameters.sonarOrganization }}
              sonarProjectKey: ${{ parameters.sonarProjectKey }}
              sonarSources: ${{ parameters.projectName }}
