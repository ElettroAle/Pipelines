# ── CI: Quality Angular (agnostico) ───────────────────────────────────────────
#
# Template di Quality gate per progetti Angular, agnostico rispetto al workflow Git.
# Non include validazione SemVer né versionamento.
#
# Può essere precursore di GitFlow/quality-angular.yaml, che aggiunge
# la validazione del titolo PR (Conventional Commits).
#
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: projectName
    type: string
    default: '$(Build.Repository.Name)'

variables:
  - name: nodeVersion
    value: '22.x'
  - group: "common-quality"

stages:
  - template: ./Modules/quality.yaml
    parameters:
      buildAndTestSteps:
        - task: NodeTool@0
          displayName: 'Install Node.js'
          inputs:
            versionSpec: $(nodeVersion)

        - script: npm ci
          displayName: 'Install Dependencies'
          workingDirectory: $(Build.SourcesDirectory)

        - script: npx ng build
          displayName: 'Angular Build (compile check)'
          workingDirectory: $(Build.SourcesDirectory)

        # Placeholder test steps:
        # - script: npx ng test --watch=false --code-coverage
        #   displayName: 'Unit Tests'
        #   workingDirectory: $(Build.SourcesDirectory)
